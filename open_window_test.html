<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>window.open Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2933;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 12px;
      color: #52606d;
      line-height: 1.5;
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-size: 13px;
      color: #3e4c59;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 0 10px;
      border: 1px solid #bcccdc;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #1f2933;
    }

    .section {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #fff;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: #243b53;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    button,
    a.button {
      display: block;
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 0;
      border-radius: 6px;
      background: #1f7a8c;
      color: #fff;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
      text-decoration: none;
    }

    button.secondary,
    a.secondary {
      background: #486581;
    }

    button.warning {
      background: #b7791f;
    }

    button.danger {
      background: #9b2c2c;
    }

    form {
      margin: 0;
    }

    pre {
      min-height: 140px;
      max-height: 260px;
      margin: 10px 0 0;
      padding: 10px;
      overflow: auto;
      border-radius: 6px;
      background: #102a43;
      color: #d9e2ec;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>window.open / WebView Test</h1>
  <p>用于观察 Android WebView 里哪些方式会触发 onCreateWindow、shouldOverrideUrlLoading 或外部浏览器。</p>

  <label for="testUrl">测试 URL</label>
  <input id="testUrl" value="https://example.com/" autocomplete="off">

  <div class="section">
    <h2>openInternalWindow 开关</h2>
    <div class="grid">
      <button type="button" onclick="setInternalWindow(true)">android.callJava openInternalWindow true</button>
      <button class="secondary" type="button" onclick="setInternalWindow(false)">android.callJava openInternalWindow false</button>
    </div>
  </div>

  <div class="section">
    <h2>window.open</h2>
    <div class="grid">
      <button type="button" onclick="openBlank()">window.open(url, '_blank')</button>
      <button type="button" onclick="openNoTarget()">window.open(url)</button>
      <button type="button" onclick="openNamed()">window.open(url, 'named_window')</button>
      <button type="button" onclick="openWithFeatures()">window.open(url, '_blank', features)</button>
      <button class="warning" type="button" onclick="openDelayed()">setTimeout 后 window.open</button>
      <button class="warning" type="button" onclick="openBlankThenAssign()">先 open about:blank 再 location.href</button>
    </div>
  </div>

  <div class="section">
    <h2>a 标签</h2>
    <div class="grid">
      <a id="linkBlank" class="button" href="https://example.com/" target="_blank">a target="_blank"</a>
      <a id="linkSelf" class="button secondary" href="https://example.com/">a 当前窗口 href</a>
      <button type="button" onclick="clickDynamicBlank()">JS 创建 a target='_blank' 并 click</button>
    </div>
  </div>

  <div class="section">
    <h2>location 当前窗口跳转</h2>
    <div class="grid">
      <button class="secondary" type="button" onclick="assignLocation()">location.href = url</button>
      <button class="secondary" type="button" onclick="assignLocationByMethod()">location.assign(url)</button>
      <button class="danger" type="button" onclick="replaceLocation()">location.replace(url)</button>
    </div>
  </div>

  <div class="section">
    <h2>form target</h2>
    <form id="blankForm" method="get" target="_blank">
      <button type="button" onclick="submitBlankForm()">form target="_blank" submit</button>
    </form>
    <h2>no target</h2>
    <form id="blankForm2" method="get">
      <button type="button" onclick="submitBlankForm2()">submit</button>
    </form>
  </div>

  <div class="section">
    <h2>特殊 scheme</h2>
    <div class="grid">
      <button type="button" onclick="openUrl('market://details?id=com.android.chrome')">window.open market://</button>
      <button type="button" onclick="openUrl('mailto:test@example.com')">window.open mailto:</button>
      <button type="button" onclick="openUrl('tel:10086')">window.open tel:</button>
    </div>
  </div>

  <div class="section">
    <h2>页面日志</h2>
    <button class="secondary" type="button" onclick="clearLog()">清空日志</button>
    <pre id="log"></pre>
  </div>

  <script>
    var logEl = document.getElementById("log");
    var input = document.getElementById("testUrl");
    var linkBlank = document.getElementById("linkBlank");
    var linkSelf = document.getElementById("linkSelf");

    function now() {
      return new Date().toLocaleTimeString();
    }

    function log(message) {
      logEl.textContent = "[" + now() + "] " + message + "\n" + logEl.textContent;
    }

    function getUrl() {
      return input.value.trim() || "https://example.com/";
    }

    function syncLinks() {
      var url = getUrl();
      linkBlank.href = url;
      linkSelf.href = url;
    }

    function setInternalWindow(value) {
      var payload = JSON.stringify({ value: value });
      log("callJava openInternalWindow: " + payload);
      if (window.android && typeof window.android.callJava === "function") {
        window.android.callJava("openInternalWindow", payload);
      } else {
        log("window.android.callJava 不存在，当前可能不在 Android WebView 内");
      }
    }

    function openUrl(url) {
      log("window.open: " + url);
      var win = window.open(url, "_blank");
      log("window.open return: " + String(win));
    }

    function openBlank() {
      var url = getUrl();
      log("window.open(url, '_blank'): " + url);
      var win = window.open(url, "_blank");
      log("return: " + String(win));
    }

    function openNoTarget() {
      var url = getUrl();
      log("window.open(url): " + url);
      var win = window.open(url);
      log("return: " + String(win));
    }

    function openNamed() {
      var url = getUrl();
      log("window.open(url, 'named_window'): " + url);
      var win = window.open(url, "named_window");
      log("return: " + String(win));
    }

    function openWithFeatures() {
      var url = getUrl();
      log("window.open(url, '_blank', 'width=480,height=640'): " + url);
      var win = window.open(url, "_blank", "width=480,height=640,noopener=no");
      log("return: " + String(win));
    }

    function openDelayed() {
      var url = getUrl();
      log("setTimeout 800ms 后 window.open(url, '_blank'): " + url);
      window.setTimeout(function () {
        var win = window.open(url, "_blank");
        log("delayed return: " + String(win));
      }, 800);
    }

    function openBlankThenAssign() {
      var url = getUrl();
      log("window.open('', '_blank') then child.location.href: " + url);
      var win = window.open("", "_blank");
      log("blank return: " + String(win));
      if (win) {
        try {
          win.location.href = url;
          log("child.location.href assigned");
        } catch (error) {
          log("assign child failed: " + error.message);
        }
      }
    }

    function clickDynamicBlank() {
      var url = getUrl();
      log("dynamic a[target=_blank].click(): " + url);
      var a = document.createElement("a");
      a.href = url;
      a.target = "_blank";
      a.rel = "opener";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function assignLocation() {
      var url = getUrl();
      log("location.href = " + url);
      window.location.href = url;
    }

    function assignLocationByMethod() {
      var url = getUrl();
      log("location.assign(" + url + ")");
      window.location.assign(url);
    }

    function replaceLocation() {
      var url = getUrl();
      log("location.replace(" + url + ")");
      window.location.replace(url);
    }

    function submitBlankForm() {
      document.getElementById("blankForm").action = getUrl();
      log("form target='_blank' submit: " + document.getElementById("blankForm").action);
      document.getElementById("blankForm").submit();
    }

    function submitBlankForm2() {
      document.getElementById("blankForm2").action = getUrl();
      log("form submit: " + document.getElementById("blankForm2").action);
      document.getElementById("blankForm2").submit();
    }

    function clearLog() {
      logEl.textContent = "";
    }

    input.addEventListener("input", syncLinks);
    syncLinks();
    log("ready: " + location.href);
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebView FCM Capability Probe</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5d667a;
        --line: #dde2ee;
        --ok: #178245;
        --warn: #9a6400;
        --bad: #b42318;
        --info: #2457c5;
        --soft-ok: #eaf7ef;
        --soft-warn: #fff4db;
        --soft-bad: #fdebea;
        --soft-info: #eaf0ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(960px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
        line-height: 1.2;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 17px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 8px 0 18px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-top: 14px;
        padding: 16px;
      }

      .verdict {
        border-left: 5px solid var(--info);
      }

      .verdict.possible {
        border-left-color: var(--ok);
        background: var(--soft-ok);
      }

      .verdict.warning {
        border-left-color: var(--warn);
        background: var(--soft-warn);
      }

      .verdict.blocked {
        border-left-color: var(--bad);
        background: var(--soft-bad);
      }

      .verdict.neutral {
        border-left-color: var(--info);
        background: var(--soft-info);
      }

      .verdict-title {
        margin: 0 0 6px;
        font-size: 19px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        min-height: 42px;
        border: 1px solid #b7c2d8;
        border-radius: 7px;
        background: #ffffff;
        color: var(--text);
        font-size: 14px;
        font-weight: 650;
        padding: 0 14px;
      }

      button.primary {
        border-color: #1f5ed7;
        background: #1f5ed7;
        color: #ffffff;
      }

      button:disabled {
        opacity: 0.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 10px;
      }

      .capability {
        min-height: 126px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #ffffff;
      }

      .capability.ok {
        border-color: #a7d9ba;
      }

      .capability.fail {
        border-color: #f1aca6;
      }

      .capability-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .capability-name {
        font-weight: 700;
      }

      .badge {
        flex: 0 0 auto;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 750;
        line-height: 1;
        padding: 6px 8px;
      }

      .badge.ok {
        background: var(--soft-ok);
        color: var(--ok);
      }

      .badge.fail {
        background: var(--soft-bad);
        color: var(--bad);
      }

      .capability-value {
        margin-bottom: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .capability-detail {
        font-size: 13px;
      }

      .log {
        min-height: 160px;
        max-height: 320px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #101827;
        color: #d8e1f3;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        padding: 12px;
        white-space: pre-wrap;
      }

      .kv {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 8px 12px;
        font-size: 14px;
      }

      .kv div:nth-child(odd) {
        color: var(--muted);
      }

      @media (max-width: 520px) {
        main {
          padding: 14px;
        }

        h1 {
          font-size: 22px;
        }

        .kv {
          grid-template-columns: 1fr;
          gap: 4px;
        }

        .toolbar button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="header">
        <h1>WebView FCM 能力探测</h1>
        <p>用于判断当前 WebView 是否具备 Web FCM 的关键前置能力。这个页面不会接入 Firebase，也不会主动申请通知权限。</p>
      </section>

      <section id="verdict" class="panel verdict neutral" aria-live="polite">
        <h2 class="verdict-title">正在检测...</h2>
        <p>页面加载后会先检测静态 Web API，Service Worker 注册需要点击按钮触发。</p>
      </section>

      <section class="panel">
        <h2>操作</h2>
        <div class="toolbar">
          <button id="refreshButton" type="button">重新检测</button>
          <button id="registerButton" class="primary" type="button">注册测试 Service Worker</button>
          <button id="firebaseButton" type="button">检查 Firebase isSupported()</button>
          <button id="permissionButton" type="button">读取通知权限</button>
          <button id="copyButton" type="button">复制结果 JSON</button>
        </div>
      </section>

      <section class="panel">
        <h2>能力项</h2>
        <div id="capabilities" class="grid"></div>
      </section>

      <section class="panel">
        <h2>运行信息</h2>
        <div class="kv">
          <div>页面地址</div>
          <div id="pageUrl"></div>
          <div>Origin</div>
          <div id="origin"></div>
          <div>Service Worker 状态</div>
          <div id="swStatus">not tested</div>
          <div>Firebase isSupported()</div>
          <div id="firebaseStatus">not tested</div>
          <div>通知权限</div>
          <div id="permissionStatus">unavailable</div>
        </div>
      </section>

      <section class="panel">
        <h2>日志</h2>
        <div id="log" class="log" role="log"></div>
      </section>
    </main>

    <script type="module">
      import {
        buildCapabilityRows,
        getFinalVerdict,
        getNotificationPermissionLabel,
      } from './fcm-probe-core.mjs';

      const state = {
        rows: [],
        serviceWorkerRegistration: 'not-tested',
        firebaseMessagingSupported: 'not-tested',
        notificationPermission: undefined,
        lastError: '',
      };

      const els = {
        verdict: document.querySelector('#verdict'),
        capabilities: document.querySelector('#capabilities'),
        log: document.querySelector('#log'),
        pageUrl: document.querySelector('#pageUrl'),
        origin: document.querySelector('#origin'),
        swStatus: document.querySelector('#swStatus'),
        firebaseStatus: document.querySelector('#firebaseStatus'),
        permissionStatus: document.querySelector('#permissionStatus'),
        refreshButton: document.querySelector('#refreshButton'),
        registerButton: document.querySelector('#registerButton'),
        firebaseButton: document.querySelector('#firebaseButton'),
        permissionButton: document.querySelector('#permissionButton'),
        copyButton: document.querySelector('#copyButton'),
      };

      function detectEnv() {
        const hasNotification = 'Notification' in window;
        return {
          isSecureContext: window.isSecureContext,
          hasServiceWorker: 'serviceWorker' in navigator,
          hasPushManager: 'PushManager' in window,
          hasNotification,
          hasIndexedDB: 'indexedDB' in window,
          hasFetch: 'fetch' in window,
          userAgent: navigator.userAgent,
          notificationPermission: hasNotification ? Notification.permission : undefined,
        };
      }

      function log(message, extra) {
        const time = new Date().toISOString();
        const suffix = extra ? `\n${JSON.stringify(extra, null, 2)}` : '';
        els.log.textContent = `[${time}] ${message}${suffix}\n\n${els.log.textContent}`;
      }

      function render() {
        state.rows = buildCapabilityRows(detectEnv());
        state.notificationPermission = 'Notification' in window ? Notification.permission : undefined;

        const verdict = getFinalVerdict(state.rows, {
          serviceWorkerRegistration: state.serviceWorkerRegistration,
          firebaseMessagingSupported: state.firebaseMessagingSupported,
          notificationPermission: state.notificationPermission,
        });

        els.verdict.className = `panel verdict ${verdict.level}`;
        els.verdict.innerHTML = `
          <h2 class="verdict-title">${escapeHtml(verdict.title)}</h2>
          <p>${escapeHtml(verdict.message)}</p>
        `;

        els.capabilities.innerHTML = state.rows.map((row) => {
          const statusClass = row.status ? 'ok' : 'fail';
          const statusText = row.status ? 'PASS' : 'FAIL';
          return `
            <article class="capability ${statusClass}">
              <div class="capability-head">
                <div class="capability-name">${escapeHtml(row.name)}</div>
                <span class="badge ${statusClass}">${statusText}</span>
              </div>
              <div class="capability-value">${escapeHtml(row.value)}</div>
              <p class="capability-detail">${escapeHtml(row.detail)}</p>
            </article>
          `;
        }).join('');

        els.pageUrl.textContent = location.href;
        els.origin.textContent = location.origin;
        els.swStatus.textContent = state.serviceWorkerRegistration;
        els.firebaseStatus.textContent = String(state.firebaseMessagingSupported);
        els.permissionStatus.textContent = getNotificationPermissionLabel(state.notificationPermission);
      }

      async function registerServiceWorker() {
        if (!('serviceWorker' in navigator)) {
          state.serviceWorkerRegistration = 'failed';
          state.lastError = 'navigator.serviceWorker is unavailable';
          log('Service Worker registration skipped: API missing');
          render();
          return;
        }

        state.serviceWorkerRegistration = 'registering';
        render();

        try {
          const registration = await navigator.serviceWorker.register('./fcm-probe-sw.js', {
            scope: './',
          });
          await navigator.serviceWorker.ready;
          state.serviceWorkerRegistration = 'success';
          state.lastError = '';
          log('Service Worker registered', {
            scope: registration.scope,
            active: Boolean(registration.active),
            installing: Boolean(registration.installing),
            waiting: Boolean(registration.waiting),
          });
        } catch (error) {
          state.serviceWorkerRegistration = 'failed';
          state.lastError = error?.message || String(error);
          log('Service Worker registration failed', {
            name: error?.name,
            message: error?.message || String(error),
          });
        } finally {
          render();
        }
      }

      async function checkFirebaseMessagingSupport() {
        state.firebaseMessagingSupported = 'checking';
        render();

        try {
          const { isSupported } = await import('https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging.js');
          const supported = await isSupported();
          state.firebaseMessagingSupported = supported;
          state.lastError = '';
          log('Firebase Messaging isSupported() completed', {
            supported,
          });
        } catch (error) {
          state.firebaseMessagingSupported = 'failed';
          state.lastError = error?.message || String(error);
          log('Firebase Messaging isSupported() failed', {
            name: error?.name,
            message: error?.message || String(error),
          });
        } finally {
          render();
        }
      }

      function readNotificationPermission() {
        if (!('Notification' in window)) {
          state.notificationPermission = undefined;
          log('Notification API is missing');
          render();
          return;
        }

        state.notificationPermission = Notification.permission;
        log('Notification permission read', {
          permission: Notification.permission,
        });
        render();
      }

      async function copyResults() {
        const payload = {
          checkedAt: new Date().toISOString(),
          url: location.href,
          origin: location.origin,
          userAgent: navigator.userAgent,
          serviceWorkerRegistration: state.serviceWorkerRegistration,
          firebaseMessagingSupported: state.firebaseMessagingSupported,
          notificationPermission: getNotificationPermissionLabel(state.notificationPermission),
          lastError: state.lastError,
          capabilities: state.rows,
          verdict: getFinalVerdict(state.rows, {
            serviceWorkerRegistration: state.serviceWorkerRegistration,
            firebaseMessagingSupported: state.firebaseMessagingSupported,
            notificationPermission: state.notificationPermission,
          }),
        };

        const text = JSON.stringify(payload, null, 2);
        try {
          await navigator.clipboard.writeText(text);
          log('Result JSON copied to clipboard');
        } catch (error) {
          log('Clipboard write failed; JSON printed below', payload);
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      els.refreshButton.addEventListener('click', () => {
        log('Manual refresh requested');
        render();
      });
      els.registerButton.addEventListener('click', registerServiceWorker);
      els.firebaseButton.addEventListener('click', checkFirebaseMessagingSupport);
      els.permissionButton.addEventListener('click', readNotificationPermission);
      els.copyButton.addEventListener('click', copyResults);

      render();
      log('Initial capability probe finished');
    </script>
  </body>
</html>
